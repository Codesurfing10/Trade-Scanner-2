<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Scanner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>Existing Column 1</th>
                <th>Existing Column 2</th>
                <th>Stage Analysis Summary</th>
                <th>Signals</th>
                <th>Existing Column 3</th>
                <!-- Add any other existing columns here -->
            </tr>
        </thead>
        <tbody>
            {{#each rows}}
            <tr>
                <td>{{this.existingColumn1}}</td>
                <td>{{this.existingColumn2}}</td>
                <td class="{{this.stage_analysis_summary_class}}">{{this.stage_analysis_summary}}</td>
                <td>
                    {{#each this.signals}}
                    <span class="tag {{this}}">{{this}}</span>
                    {{/each}}
                </td>
                <td>{{this.existingColumn3}}</td>
                <!-- Render any other existing columns here -->
            </tr>
            {{/each}}
        </tbody>
    </table>
</body>
</html>
