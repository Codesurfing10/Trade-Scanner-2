<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trade Scanner</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background: #0b0f17; color: #e6e8ee; }
    header { padding: 24px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    h1 { margin: 0; font-size: 22px; }
    main { padding: 16px; max-width: 1100px; margin: 0 auto; }
    .meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 13px; color: #aab0bf; margin-top: 8px; }
    .pill { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); padding: 4px 10px; border-radius: 999px; }
    .error { background: rgba(255,0,0,0.08); border: 1px solid rgba(255,0,0,0.25); padding: 12px; border-radius: 10px; margin: 12px 0; color: #ffd2d2; display: none; white-space: pre-wrap; }
    table { width: 100%; border-collapse: collapse; margin-top: 14px; }
    th, td { text-align: left; padding: 10px 10px; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 13px; vertical-align: top; }
    th { position: sticky; top: 0; background: #0b0f17; z-index: 1; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: #aab0bf; }
    tr:hover td { background: rgba(255,255,255,0.03); }
    .right { text-align: right; }

    /* existing "Type" tag styles */
    .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; border: 1px solid rgba(255,255,255,0.12); white-space: nowrap; }
    .tag.bullish { background: rgba(0, 200, 120, 0.12); border-color: rgba(0, 200, 120, 0.35); }
    .tag.bearish { background: rgba(255, 70, 70, 0.12); border-color: rgba(255, 70, 70, 0.35); }
    .tag.oversold { background: rgba(90, 160, 255, 0.12); border-color: rgba(90, 160, 255, 0.35); }
    .tag.overbought { background: rgba(255, 170, 70, 0.12); border-color: rgba(255, 170, 70, 0.35); }
    .tag.neutral { background: rgba(255, 255, 255, 0.06); border-color: rgba(255, 255, 255, 0.12); }

    /* NEW: action / stage analysis summary tag styles */
    .tag.buy  { background: rgba(0, 200, 120, 0.14); border-color: rgba(0, 200, 120, 0.45); }
    .tag.sell { background: rgba(255, 70, 70, 0.14); border-color: rgba(255, 70, 70, 0.45); }
    .tag.hold { background: rgba(255, 170, 70, 0.14); border-color: rgba(255, 170, 70, 0.45); }

    /* NEW: signal pills (individual) */
    .signals { display: flex; gap: 6px; flex-wrap: wrap; }
    .sig { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; border: 1px solid rgba(255,255,255,0.12); white-space: nowrap; }
    .sig.bullish { background: rgba(0, 200, 120, 0.10); border-color: rgba(0, 200, 120, 0.30); }
    .sig.bearish { background: rgba(255, 70, 70, 0.10); border-color: rgba(255, 70, 70, 0.30); }
    .sig.oversold { background: rgba(90, 160, 255, 0.10); border-color: rgba(90, 160, 255, 0.30); }
    .sig.overbought { background: rgba(255, 170, 70, 0.10); border-color: rgba(255, 170, 70, 0.30); }
    .sig.breakout { background: rgba(190, 120, 255, 0.10); border-color: rgba(190, 120, 255, 0.30); }
    .sig.momentum { background: rgba(90, 160, 255, 0.10); border-color: rgba(90, 160, 255, 0.30); }
    .sig.high-volume { background: rgba(255, 255, 255, 0.06); border-color: rgba(255, 255, 255, 0.20); }
    .sig.macd-bullish { background: rgba(0, 200, 120, 0.08); border-color: rgba(0, 200, 120, 0.25); }
    .sig.macd-bearish { background: rgba(255, 70, 70, 0.08); border-color: rgba(255, 70, 70, 0.25); }

    footer { font-size: 12px; color: #7d8496; text-align: center; padding: 20px 16px; border-top: 1px solid rgba(255,255,255,0.08); margin-top: 26px; }
    a { color: #a8c7ff; }
    .small { font-size: 12px; color: #aab0bf; }
  </style>
</head>
<body>
  <header>
    <h1>Trade Scanner</h1>
    <div class="small">Loads <code>docs/stocks.json</code> generated by <code>build_pages.py</code>.</div>
    <div class="meta">
      <div class="pill">Updated: <span id="updated">—</span></div>
      <div class="pill">Count: <span id="count">—</span></div>
      <div class="pill">Source: <a id="sourceLink" href="stocks.json">stocks.json</a></div>
    </div>
  </header>

  <main>
    <div id="error" class="error"></div>

    <table id="table" aria-label="Scanner results" style="display:none">
      <thead>
        <tr>
          <th>Symbol</th>
          <th>Name</th>
          <th class="right">Price</th>
          <th class="right">Change %</th>
          <th class="right">RSI</th>
          <th>Stage</th>
          <th>Stage Analysis Summary</th>
          <th>Signals</th>
          <th>Type</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </main>

  <footer>
    Disclaimer: This website is for entertainment purposes only and is not financial advice.
  </footer>

  <script>
    const $ = (id) => document.getElementById(id);

    function fmtNum(x, digits = 2) {
      if (x === null || x === undefined || Number.isNaN(x)) return "—";
      return Number(x).toFixed(digits);
    }

    function fmtPct(x, digits = 2) {
      if (x === null || x === undefined || Number.isNaN(x)) return "—";
      const n = Number(x);
      const s = (n >= 0 ? "+" : "") + n.toFixed(digits) + "%";
      return s;
    }

    function showError(msg) {
      const el = $("error");
      el.style.display = "block";
      el.textContent = msg;
    }

    function tagClass(signalType) {
      const t = (signalType || "neutral").toLowerCase();
      if (["bullish","bearish","oversold","overbought","neutral"].includes(t)) return t;
      return "neutral";
    }

    // NEW: convert a signal label to a CSS-friendly class
    function sigClass(label) {
      const s = String(label || "").trim().toLowerCase();
      if (!s) return "neutral";
      // map common multi-word signals to stable classes
      if (s === "macd bullish") return "macd-bullish";
      if (s === "macd bearish") return "macd-bearish";
      if (s === "high volume") return "high-volume";
      return s.replace(/\s+/g, "-"); // "Stage 2" => "stage-2" (safe fallback)
    }

    // NEW: style BUY/HOLD/SELL
    function actionClass(action) {
      const a = String(action || "").trim().toLowerCase();
      if (a === "buy") return "buy";
      if (a === "sell") return "sell";
      if (a === "hold") return "hold";
      return "neutral";
    }

    async function load() {
      const url = "stocks.json";
      try {
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status} fetching ${url}`);
        const data = await res.json();

        $("updated").textContent = data.updated || "—";
        $("count").textContent = (data.count ?? data.stocks?.length ?? "—").toString();

        const stocks = Array.isArray(data.stocks) ? data.stocks : [];
        if (!stocks.length) {
          showError("stocks.json loaded successfully, but it contains no stock rows. Run build_pages.py and commit docs/stocks.json.");
          return;
        }

        const tbody = $("tbody");
        tbody.innerHTML = "";

        for (const row of stocks) {
          const tr = document.createElement("tr");

          const sym = row.symbol ?? "";
          const name = row.name ?? "";

          const price = fmtNum(row.price, 2);
          const chg = fmtPct(row.change_pct, 2);
          const rsi = fmtNum(row.rsi, 2);
          const stage = row.stage_classification ?? "—";

          const type = row.signal_type ?? "neutral";
          const action = row.action_signal ?? row.position ?? row.stage_analysis_summary ?? "—";

          // NEW: stage analysis summary (prefer dedicated key if present)
          const stageSummary = row.stage_analysis_summary ?? row.action_signal ?? row.position ?? "—";

          // NEW: render each signal as a pill (fallback to old comma-separated string)
          const sigs = Array.isArray(row.signals) ? row.signals : [];
          const sigHtml = sigs.length
            ? `<div class="signals">${sigs.map(s => `<span class="sig ${sigClass(s)}">${s}</span>`).join("")}</div>`
            : (row.signals ? String(row.signals) : "—");

          tr.innerHTML = `
            <td><strong>${sym}</strong></td>
            <td>${name}</td>
            <td class="right">${price}</td>
            <td class="right">${chg}</td>
            <td class="right">${rsi}</td>
            <td>${stage}</td>
            <td><span class="tag ${actionClass(stageSummary)}">${stageSummary}</span></td>
            <td>${sigHtml}</td>
            <td><span class="tag ${tagClass(type)}">${type}</span></td>
            <td><span class="tag ${actionClass(action)}">${action}</span></td>
          `;

          tbody.appendChild(tr);
        }

        $("table").style.display = "table";
      } catch (err) {
        showError(
          "Failed to load stocks.json. " +
          "If you see this on GitHub Pages, confirm docs/stocks.json exists in the deployed artifact and that index.html is served from /docs.\n\n" +
          String(err)
        );
      }
    }

    load();
  </script>
</body>
</html>
